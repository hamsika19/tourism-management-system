{% extends 'base.html' %}
{% block title %}Register - WanderLux{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>Create Account</h2>
        <p class="subtitle">Join thousands of happy travelers</p>
        <form method="POST">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="Your full name" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Phone Number</label>
                <input type="tel" name="phone" class="form-control" placeholder="+91 98765 43210">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary form-full">Create Account <i class="fas fa-arrow-right"></i></button>
        </form>
        <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
    </div>
</div>
{% endblock %}
