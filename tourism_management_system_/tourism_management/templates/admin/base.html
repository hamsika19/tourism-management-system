{% extends 'base.html' %}
{% block content %}
<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="sidebar-logo">Admin Panel</div>
        <nav class="sidebar-nav">
            <a href="{{ url_for('admin_dashboard') }}" class="{% if request.endpoint=='admin_dashboard' %}active{% endif %}">
                <i class="fas fa-tachometer-alt"></i> Dashboard
            </a>
            <a href="{{ url_for('admin_bookings') }}" class="{% if request.endpoint=='admin_bookings' %}active{% endif %}">
                <i class="fas fa-calendar-check"></i> Bookings
            </a>
            <a href="{{ url_for('admin_destinations') }}" class="{% if 'destination' in request.endpoint %}active{% endif %}">
                <i class="fas fa-map-marker-alt"></i> Destinations
            </a>
            <a href="{{ url_for('admin_users') }}" class="{% if request.endpoint=='admin_users' %}active{% endif %}">
                <i class="fas fa-users"></i> Users
            </a>
            <hr style="border-color:rgba(255,255,255,0.1);margin:12px 24px">
            <a href="{{ url_for('index') }}"><i class="fas fa-globe"></i> View Website</a>
            <a href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
    </aside>
    <div class="admin-content">
        {% block admin_content %}{% endblock %}
    </div>
</div>
{% endblock %}
