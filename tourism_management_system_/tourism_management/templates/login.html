{% extends 'base.html' %}
{% block title %}Login - WanderLux{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div style="text-align:center;margin-bottom:24px">
            <div class="logo" style="justify-content:center;margin-bottom:8px">
                <span class="logo-icon"><i class="fas fa-compass"></i></span>
                <span class="logo-text">Wander<em>Lux</em></span>
            </div>
        </div>
        <h2>Welcome Back</h2>
        <p class="subtitle">Login to continue your journey</p>
        <form method="POST">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary form-full">Login <i class="fas fa-arrow-right"></i></button>
        </form>
        <div style="background:var(--primary-light);border-radius:8px;padding:12px 16px;margin-top:16px;font-size:13px;color:var(--text-muted)">
            <strong>Demo:</strong> admin@tourism.com / admin123
        </div>
        <p class="auth-footer">Don't have an account? <a href="{{ url_for('register') }}">Sign up free</a></p>
    </div>
</div>
{% endblock %}
